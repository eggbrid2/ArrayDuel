    </filter>
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency=".012 .036" numOctaves="4" seed="17"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .16"/>
      </feComponentTransfer>
    </filter>
    <path id="mistLine" d="M-60 0 C120 -42 232 38 410 4 C600 -32 735 30 920 -2 C1120 -38 1274 28 1500 -14"/>
  </defs>

