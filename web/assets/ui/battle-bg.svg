<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2560" viewBox="0 0 1440 2560" role="img" aria-label="Array Duel ink landscape battlefield background">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef1e2"/>
      <stop offset=".35" stop-color="#e4eadc"/>
      <stop offset=".68" stop-color="#d8e0d1"/>
      <stop offset="1" stop-color="#cfd8ca"/>
    </linearGradient>
    <linearGradient id="skyMist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7d8d4" stop-opacity=".72"/>
      <stop offset=".5" stop-color="#eaf0e5" stop-opacity=".58"/>
      <stop offset="1" stop-color="#f5f0df" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
